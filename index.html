<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora Prototype Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FAFAF8;
      font-family: 'DM Sans', -apple-system, sans-serif;
      color: #1A1A18;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 48px 120px;
    }

    /* ── Header ── */
    header { margin-bottom: 80px; }

    h1 {
      font-size: 72px;
      font-weight: 300;
      line-height: 90px;
      letter-spacing: -1.5px;
      color: #1A1A18;
    }

    h1 em {
      font-style: italic;
      color: #888780;
    }

    /* ── Month sections ── */
    .month-section { margin-bottom: 56px; }

    .month-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #B4B2A9;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 0.5px solid #E8E6DF;
    }

    /* ── Prototype item ── */
    .proto-item { border-bottom: 0.5px solid #F0EDE6; }

    .proto-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      cursor: pointer;
      user-select: none;
    }

    .proto-toggle {
      font-size: 11px;
      color: #D3D1C7;
      flex: 0 0 12px;
      transition: transform 0.18s ease;
      line-height: 1;
    }

    .proto-toggle.open { transform: rotate(90deg); }

    .proto-row-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .proto-name {
      font-size: 15px;
      font-weight: 400;
      color: #1A1A18;
    }

    .proto-row:hover .proto-name {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .proto-author {
      font-size: 13px;
      color: #C4C2BA;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    /* ── Expandable panel ── */
    .versions-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
    }

    .versions-panel.open { max-height: 800px; }

    .versions-inner {
      padding: 0 0 16px 24px;
      display: flex;
      flex-direction: column;
    }

    .proto-description {
      font-size: 13px;
      color: #888780;
      line-height: 1.65;
      padding: 0 0 16px 0;
      max-width: 540px;
    }

    /* ── Version rows ── */
    .versions-list { display: flex; flex-direction: column; }

    .version-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-top: 0.5px solid #F5F3EE;
      text-decoration: none;
    }

    .version-row:hover .version-label {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .version-tag {
      font-size: 11px;
      letter-spacing: 0.04em;
      color: #B4B2A9;
      background: #F1EFE8;
      border-radius: 4px;
      padding: 2px 7px;
      flex: 0 0 auto;
      font-family: ui-monospace, 'SF Mono', monospace;
    }

    .version-label {
      font-size: 13px;
      color: #888780;
      flex: 1;
    }

    .version-date {
      font-size: 12px;
      color: #C4C2BA;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .version-arrow { font-size: 12px; color: #C4C2BA; }

    /* Latest version highlight */
    .version-row.is-latest .version-tag {
      color: #FD6030;
      background: #FFF1EC;
      border: 0.5px solid #FDBEA8;
    }

    .version-row.is-latest .version-label { color: #1A1A18; }
    .version-row.is-latest .version-arrow { color: #FD6030; }

    /* ── Empty state ── */
    .empty {
      font-size: 14px;
      color: #C4C2BA;
      padding: 48px 0;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page { padding: 48px 24px 80px; }
      h1 { font-size: 48px; line-height: 60px; }
      .version-date { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Aurora prototype<br><em>playground</em></h1>
    </header>
    <main id="root"></main>
  </div>

  <script>
    async function loadData() {
      const res = await fetch('./data.json');
      if (!res.ok) throw new Error('Could not load data.json');
      return res.json();
    }

    function groupByMonth(prototypes) {
      const months = {};
      prototypes.forEach(proto => {
        // Use the date of the latest version to bucket into a month
        const versions = proto.versions;
        if (!versions || versions.length === 0) return;
        const latestDate = versions[versions.length - 1].date;
        // Parse "Mon DD, YYYY" → "Month YYYY" key
        const d = new Date(latestDate);
        const key = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        const sortKey = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
        if (!months[key]) months[key] = { label: key, sortKey, protos: [] };
        months[key].protos.push(proto);
      });
      // Sort months newest first
      return Object.values(months).sort((a, b) => b.sortKey.localeCompare(a.sortKey));
    }

    function buildVersions(versions) {
      if (!versions || versions.length === 0) return '';
      // Versions in data.json are oldest-first; display newest-first
      const reversed = [...versions].reverse();
      return reversed.map((v, i) => {
        const isLatest = i === 0;
        return `
          <a href="${v.url}" class="version-row${isLatest ? ' is-latest' : ''}">
            <span class="version-tag">${v.tag}</span>
            <span class="version-label">${v.label}</span>
            <span class="version-date">${v.date}</span>
            <span class="version-arrow">↗</span>
          </a>`;
      }).join('');
    }

    function buildProto(proto) {
      return `
        <div class="proto-item">
          <div class="proto-row" onclick="toggle(this)">
            <span class="proto-toggle">▶</span>
            <div class="proto-row-content">
              <span class="proto-name">${proto.name}</span>
              <span class="proto-author">${proto.author}</span>
            </div>
          </div>
          <div class="versions-panel">
            <div class="versions-inner">
              ${proto.description ? `<p class="proto-description">${proto.description}</p>` : ''}
              <div class="versions-list">
                ${buildVersions(proto.versions)}
              </div>
            </div>
          </div>
        </div>`;
    }

    function buildMonth(month) {
      return `
        <div class="month-section">
          <div class="month-label">${month.label}</div>
          ${month.protos.map(buildProto).join('')}
        </div>`;
    }

    function render(prototypes) {
      const root = document.getElementById('root');
      if (!prototypes.length) {
        root.innerHTML = '<p class="empty">No prototypes yet.</p>';
        return;
      }
      // Sort each prototype's bucket by latest version date, newest first
      const months = groupByMonth(prototypes);
      root.innerHTML = months.map(buildMonth).join('');
    }

    function toggle(row) {
      const arrow = row.querySelector('.proto-toggle');
      const panel = row.nextElementSibling;
      const isOpen = panel.classList.contains('open');
      arrow.classList.toggle('open', !isOpen);
      panel.classList.toggle('open', !isOpen);
    }

    loadData()
      .then(render)
      .catch(err => {
        document.getElementById('root').innerHTML =
          `<p class="empty">Could not load prototypes: ${err.message}</p>`;
      });
  </script>
</body>
</html>
