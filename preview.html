<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora Prototype Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FAFAF8;
      font-family: 'DM Sans', -apple-system, sans-serif;
      color: #1A1A18;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 48px 120px;
    }

    /* ── Header ── */
    header { margin-bottom: 80px; }

    h1 {
      font-size: 72px;
      font-weight: 300;
      line-height: 90px;
      letter-spacing: -1.5px;
      color: #1A1A18;
    }

    h1 em {
      font-style: italic;
      color: #888780;
    }

    /* ── Month sections ── */
    .month-section { margin-bottom: 56px; }

    .month-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #B4B2A9;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 0.5px solid #E8E6DF;
    }

    /* ── Prototype item ── */
    .proto-item { border-bottom: 0.5px solid #F0EDE6; }

    .proto-row {
      display: flex;
      align-items: center;
      padding: 14px 0;
      text-decoration: none;
    }

    .proto-row-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .proto-name-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .proto-name {
      font-size: 15px;
      font-weight: 400;
      color: #1A1A18;
    }

    .proto-row:hover .proto-name {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .proto-vtag {
      font-size: 11px;
      letter-spacing: 0.04em;
      color: #B4B2A9;
      background: #F1EFE8;
      border-radius: 4px;
      padding: 2px 7px;
      font-family: ui-monospace, 'SF Mono', monospace;
    }

    .proto-author {
      font-size: 13px;
      color: #C4C2BA;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    /* ── Meta row (description + see all versions) ── */
    .proto-meta {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      padding: 0 0 16px 0;
    }

    .proto-description {
      font-size: 13px;
      color: #888780;
      line-height: 1.65;
      flex: 1;
    }

    .see-more-btn {
      font-size: 12px;
      color: #B4B2A9;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
      font-family: inherit;
      flex: 0 0 auto;
      margin-top: 2px;
    }

    .see-more-btn:hover { color: #888780; }

    /* ── Expandable panel ── */
    .versions-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
    }

    .versions-panel.open { max-height: 800px; }

    .versions-inner {
      padding: 0 0 16px 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Version rows ── */
    .versions-list { display: flex; flex-direction: column; }

    .version-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-top: 0.5px solid #F5F3EE;
      text-decoration: none;
    }

    .version-row:hover .version-label {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .version-tag {
      font-size: 11px;
      letter-spacing: 0.04em;
      color: #B4B2A9;
      background: #F1EFE8;
      border-radius: 4px;
      padding: 2px 7px;
      flex: 0 0 auto;
      font-family: ui-monospace, 'SF Mono', monospace;
    }

    .version-label {
      font-size: 13px;
      color: #888780;
      flex: 1;
    }

    .version-date {
      font-size: 12px;
      color: #C4C2BA;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .version-arrow { font-size: 12px; color: #C4C2BA; }

    /* Latest version highlight */
    .version-row.is-latest .version-tag {
      color: #FD6030;
      background: #FFF1EC;
      border: 0.5px solid #FDBEA8;
    }

    .version-row.is-latest .version-label { color: #1A1A18; }
    .version-row.is-latest .version-arrow { color: #FD6030; }

    /* ── Empty state ── */
    .empty {
      font-size: 14px;
      color: #C4C2BA;
      padding: 48px 0;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page { padding: 48px 24px 80px; }
      h1 { font-size: 48px; line-height: 60px; }
      .version-date { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Aurora prototype<br><em>playground</em></h1>
    </header>
    <main id="root"></main>
  </div>

  <script>
    const DATA = [
      {
        "name": "Adders & Discounts",
        "author": "Kevin",
        "description": "Exploring adders and discounts that apply to products, stand alone, and net adjustments",
        "versions": [
          {
            "tag": "v1",
            "label": "Radio group exploration",
            "date": "Mar 3, 2025",
            "url": "./adders-discounts/v1/index.html"
          },
          {
            "tag": "v2",
            "label": "New adder — default state scaffold",
            "date": "Mar 14, 2026",
            "url": "./adders-discounts/v2/index.html"
          }
        ]
      },
      {
        "name": "Text Variables",
        "author": "Kevin",
        "description": "Exploring a model where text variables are scoped to just two states: pre-design and post-design. If a user needs to isolate a specific scenario (e.g. energy efficiency measures only), they'd create a separate design and drop in that design's post-design variable.",
        "versions": [
          {
            "tag": "v1",
            "label": "Pre-design/post-design with variable parameters and conditional descriptions",
            "date": "Mar 10, 2025",
            "url": "./text-variables/v1/index.html"
          }
        ]
      }
    ];

    function groupByMonth(prototypes) {
      const months = {};
      prototypes.forEach(proto => {
        const versions = proto.versions;
        if (!versions || versions.length === 0) return;
        const latestDate = versions[versions.length - 1].date;
        const d = new Date(latestDate);
        const key = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        const sortKey = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
        if (!months[key]) months[key] = { label: key, sortKey, protos: [] };
        months[key].protos.push(proto);
      });
      return Object.values(months).sort((a, b) => b.sortKey.localeCompare(a.sortKey));
    }

    function buildVersions(versions) {
      if (!versions || versions.length === 0) return '';
      const reversed = [...versions].reverse();
      return reversed.map((v, i) => {
        const isLatest = i === 0;
        return `
          <a href="${v.url}" class="version-row${isLatest ? ' is-latest' : ''}">
            <span class="version-tag">${v.tag}</span>
            <span class="version-label">${v.label}</span>
            <span class="version-date">${v.date}</span>
            <span class="version-arrow">→</span>
          </a>`;
      }).join('');
    }

    function buildProto(proto) {
      const versions = proto.versions || [];
      const latest = versions[versions.length - 1];
      const hasMultiple = versions.length > 1;
      const latestUrl = latest ? latest.url : '#';
      const latestTag = latest ? latest.tag : '';
      const hasMeta = proto.description || hasMultiple;

      return `
        <div class="proto-item">
          <a href="${latestUrl}" class="proto-row">
            <div class="proto-row-content">
              <div class="proto-name-group">
                <span class="proto-name">${proto.name}</span>
                ${latestTag ? `<span class="proto-vtag">${latestTag}</span>` : ''}
              </div>
              <span class="proto-author">${proto.author}</span>
            </div>
          </a>
          ${hasMeta ? `
          <div class="proto-meta">
            ${proto.description ? `<p class="proto-description">${proto.description}</p>` : '<span></span>'}
            ${hasMultiple ? `<button class="see-more-btn" onclick="toggleVersions(this)">See all versions</button>` : ''}
          </div>` : ''}
          ${hasMultiple ? `
          <div class="versions-panel">
            <div class="versions-inner">
              <div class="versions-list">
                ${buildVersions(versions)}
              </div>
            </div>
          </div>` : ''}
        </div>`;
    }

    function buildMonth(month) {
      return `
        <div class="month-section">
          <div class="month-label">${month.label}</div>
          ${month.protos.map(buildProto).join('')}
        </div>`;
    }

    function render(prototypes) {
      const root = document.getElementById('root');
      if (!prototypes.length) {
        root.innerHTML = '<p class="empty">No prototypes yet.</p>';
        return;
      }
      const months = groupByMonth(prototypes);
      root.innerHTML = months.map(buildMonth).join('');
    }

    function toggleVersions(btn) {
      const panel = btn.closest('.proto-item').querySelector('.versions-panel');
      const isOpen = panel.classList.contains('open');
      panel.classList.toggle('open', !isOpen);
      btn.textContent = isOpen ? 'See all versions' : 'Hide versions';
    }

    render(DATA);
  </script>
</body>
</html>
